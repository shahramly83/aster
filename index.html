    <!-- Pre-boot gate ----------------------------------------------------------
      The "/" route is prerendered into this file, which Vercel also serves as the
      SPA fallback for app routes (/dashboard, /login, email-confirm links, …). So
      a returning/signed-in user hard-refreshing the app would paint the static
      marketing HTML for a beat before React boots and swaps in the app. This runs
      BEFORE the body paints: if a Supabase session is on disk, or auth tokens are
      in the URL (email confirmation / cross-subdomain handoff), we hide the
      marketing markup and show the Aster splash immediately — one continuous load,
      no marketing flash. Logged-out visitors and crawlers have neither signal, so
      they still get the full prerendered marketing page (SEO untouched). React
      removes data-app-booting on its first commit, handing off to its own splash. -->
    <style>
      /* One overlay for both the initial boot splash and client-side route
         transitions. Always in the DOM at opacity 0 (invisible, click-through); an
         attribute snaps it opaque to cover a swap, and removing it fades back out so
         the marketing header / content is never seen mid-transition. */
      #aster-boot {
        position: fixed; inset: 0; z-index: 2147483647;
        display: flex; align-items: center; justify-content: center;
        background: #F4F2FA; opacity: 0; pointer-events: none;
        transition: opacity 0.28s ease;
      }
      html[data-app-booting] #aster-boot,
      html[data-route-transition] #aster-boot {
        opacity: 1; pointer-events: auto; transition: none;
      }
      html[data-app-booting] #root { visibility: hidden; }
      #aster-boot svg { transform-origin: center; animation: asterBootSpin 1.6s linear infinite; }
      @keyframes asterBootSpin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { #aster-boot svg { animation: none; } }
    </style>
    <script>
      (function () {
        try {
          var loc = window.location;
          // Auth signals can arrive in the hash (#access_token, cross-subdomain
          // #ws_at handoff) OR the query string (email confirm points at
          // /auth/confirm?token_hash=...&type=signup, OAuth ?code=, ?invite=).
          // Match both, plus the auth/reset paths themselves, so the splash covers
          // every route that resolves into the app — never a marketing flash.
          var q = (loc.hash || "") + (loc.search || "");
          var authSignal =
            /(?:ws_at=|ws_rt=|access_token=|refresh_token=|type=signup|type=recovery|token_hash=|[?&]code=|[?&]invite=)/.test(q)
            || /^\/auth(?:\/|$)/.test(loc.pathname || "")
            || /^\/reset-password/.test(loc.pathname || "");
          var hasToken = false;
          try {
            var ls = window.localStorage;
            for (var i = 0; i < ls.length; i++) {
              var k = ls.key(i);
              if (k && k.indexOf("sb-") === 0 && k.indexOf("-auth-token") !== -1 && ls.getItem(k)) { hasToken = true; break; }
            }
          } catch (e) { /* storage blocked (private mode) — treat as signed-out */ }
          if (hasToken || authSignal) document.documentElement.setAttribute("data-app-booting", "");
        } catch (e) { /* never let the gate break the page */ }
      })();
    </script>
