<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Aster: AI Recruitment Software for Growing Teams</title>
    <meta name="description" content="AI recruitment software that screens every resume, ranks applicants by role fit, and books interviews, turning a two-week shortlist into an afternoon." />
    <link rel="canonical" href="https://hireaster.com/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Aster" />
    <meta name="application-name" content="Aster" />
    <meta name="theme-color" content="#973BF7" />
    <meta name="color-scheme" content="light dark" />

    <!-- Icons & manifest -->
    <link rel="icon" type="image/svg+xml" href="/aster-mark.svg" />
    <link rel="apple-touch-icon" href="/aster-mark.svg" />
    <link rel="mask-icon" href="/aster-mark.svg" color="#973BF7" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aster" />
    <meta property="og:title" content="Aster: AI Recruitment Software for Growing Teams" />
    <meta property="og:description" content="Screen every resume, rank applicants against the role, and automate interview scheduling. Turn a two-week shortlist into an afternoon." />
    <meta property="og:url" content="https://hireaster.com/" />
    <meta property="og:image" content="https://hireaster.com/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Aster: AI recruitment platform for growing teams" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aster: AI Recruitment Software for Growing Teams" />
    <meta name="twitter:description" content="Screen every resume, rank applicants against the role, and automate interview scheduling. Turn a two-week shortlist into an afternoon." />
    <meta name="twitter:image" content="https://hireaster.com/og-image.svg" />
    <meta name="twitter:image:alt" content="Aster: AI recruitment platform for growing teams" />

    <!-- Performance: warm up the font origins used by the app's runtime CSS @import -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://hireaster.com/#organization",
          "name": "Aster",
          "url": "https://hireaster.com/",
          "logo": "https://hireaster.com/aster-mark.svg",
          "image": "https://hireaster.com/og-image.svg",
          "description": "AI recruitment platform that screens every resume, ranks applicants against the role, and automates interview scheduling.",
          "email": "hello@aster.co"
        },
        {
          "@type": "WebSite",
          "@id": "https://hireaster.com/#website",
          "url": "https://hireaster.com/",
          "name": "Aster",
          "description": "AI recruitment platform for growing teams.",
          "publisher": { "@id": "https://hireaster.com/#organization" },
          "inLanguage": "en"
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://hireaster.com/#software",
          "name": "Aster",
          "applicationCategory": "BusinessApplication",
          "applicationSubCategory": "Recruitment & Applicant Tracking (ATS)",
          "operatingSystem": "Web",
          "url": "https://hireaster.com/",
          "description": "Aster screens every resume, ranks applicants against the role with AI match scores, runs structured interviews and scorecards, and automates scheduling, an end-to-end hiring platform for growing teams.",
          "publisher": { "@id": "https://hireaster.com/#organization" },
          "offers": {
            "@type": "Offer",
            "category": "SaaS subscription",
            "availability": "https://schema.org/InStock"
          },
          "featureList": [
            "AI resume screening and parsing",
            "Applicant ranking by role fit",
            "Applicant tracking system (ATS)",
            "Structured interviews and scorecards",
            "Automated interview scheduling",
            "Branded career site and job board",
            "Hiring team collaboration",
            "Analytics and reporting"
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
