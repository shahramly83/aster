name: Daily blog article

# Writes one on-brand Aster article with Claude Opus 4.8 and commits it straight
# to main. Vercel deploys on push, and the build prerenders the new /blog/<slug>
# page automatically. Requires the ANTHROPIC_API_KEY repository secret.

on:
  schedule:
    - cron: "0 13 * * 1,4" # Mon & Thu at 13:00 UTC (twice weekly)
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: daily-blog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the pre-push rebase below has something to rebase onto

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate today's article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run blog:generate

      - name: Commit and push
        run: |
          if git diff --quiet -- src/generated-posts.js public/sitemap.xml; then
            echo "No new article was produced; nothing to commit."
            exit 0
          fi
          git config user.name "aster-blog-bot"
          git config user.email "blog-bot@hireaster.com"
          git add src/generated-posts.js public/sitemap.xml
          git commit -m "Blog: daily article ($(date -u +%Y-%m-%d))"
          # main moves often (the team pushes through the day), so a plain push
          # races and gets rejected ("fetch first"), silently dropping the article.
          # Rebase the bot's commit onto the latest main and retry a few times.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto latest origin/main…"
            git pull --rebase origin main || { echo "Rebase hit a conflict; aborting."; git rebase --abort || true; exit 1; }
            sleep $((attempt * 3))
          done
          echo "Could not push the article after 5 attempts."
          exit 1
